<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON FACE SCAN</title>

<style>
:root{
  --accent:#39ff14;
  --bg:#0a0f0a;
  --panel:#111a11;
}

body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow:hidden;
}

/* ローディング */
.loader{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.loader-circle{
  width:80px;
  height:80px;
  border:4px solid rgba(57,255,20,0.2);
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 20px var(--accent);
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* メイン */
.container{
  opacity:0;
  transition:1s;
  padding:30px;
}

.container.active{
  opacity:1;
}

h1{
  color:var(--accent);
  text-shadow:0 0 15px var(--accent);
}

/* ビデオ枠 */
.video-wrapper{
  position:relative;
  display:inline-block;
  margin-top:20px;
  border:2px solid var(--accent);
  border-radius:20px;
  box-shadow:0 0 25px rgba(57,255,20,0.5);
}

video{
  width:320px;
  max-width:90%;
  border-radius:20px;
}

/* ===== HUDターゲット ===== */
.hud{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}

.target{
  width:150px;
  height:150px;
  border:2px solid var(--accent);
  border-radius:50%;
  box-shadow:0 0 20px var(--accent);
  position:relative;
  animation:pulse 2s infinite;
}

.target::before,
.target::after{
  content:"";
  position:absolute;
  background:var(--accent);
}

.target::before{
  width:2px;
  height:100%;
  left:50%;
  transform:translateX(-50%);
}

.target::after{
  height:2px;
  width:100%;
  top:50%;
  transform:translateY(-50%);
}

@keyframes pulse{
  0%,100%{ opacity:0.5; }
  50%{ opacity:1; }
}

/* ボタン */
button{
  margin-top:25px;
  padding:12px 40px;
  font-size:18px;
  background:transparent;
  border:2px solid var(--accent);
  color:var(--accent);
  border-radius:50px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:var(--accent);
  color:black;
  box-shadow:0 0 20px var(--accent);
}

/* ゲージ */
.gauge{
  margin-top:20px;
  width:300px;
  max-width:90%;
  height:20px;
  border:1px solid var(--accent);
  margin-left:auto;
  margin-right:auto;
}

.gauge-bar{
  height:100%;
  width:0%;
  background:var(--accent);
  box-shadow:0 0 15px var(--accent);
  transition:0.5s;
}

#powerText{
  margin-top:10px;
  color:var(--accent);
  font-weight:bold;
}

canvas{
  display:none;
}
</style>
</head>

<body>

<div class="loader" id="loader">
  <div class="loader-circle"></div>
  <div style="color:#39ff14;margin-top:15px;">SYSTEM BOOTING...</div>
</div>

<div class="container" id="main">
  <h1>FACE TARGET LOCK</h1>

  <div class="video-wrapper">
    <video id="video" autoplay playsinline></video>

    <div class="hud">
      <div class="target"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <br>
  <button id="attackBtn">ATTACK</button>

  <div class="gauge">
    <div class="gauge-bar" id="gaugeBar"></div>
  </div>
  <div id="powerText">ATTACK POWER: 0</div>
</div>

<script>
const loader = document.getElementById("loader");
const main = document.getElementById("main");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const attackBtn = document.getElementById("attackBtn");
const gaugeBar = document.getElementById("gaugeBar");
const powerText = document.getElementById("powerText");

// ローディング演出
window.addEventListener("load",()=>{
  setTimeout(()=>{
    loader.style.display="none";
    main.classList.add("active");
  },1500);
});

// カメラ起動
async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user" },
      audio:false
    });
    video.srcObject = stream;
  }catch{
    alert("カメラ許可が必要です");
  }
}
startCamera();

// 攻撃処理
attackBtn.addEventListener("click",()=>{

  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;

  let totalBrightness = 0;
  let pixelCount = data.length / 4;

  for(let i=0;i<data.length;i+=4){
    const r = data[i];
    const g = data[i+1];
    const b = data[i+2];

    // 明度計算（標準輝度式）
    const brightness = 0.299*r + 0.587*g + 0.114*b;
    totalBrightness += brightness;
  }

  const avgBrightness = totalBrightness / pixelCount;

  // 0〜255 → 攻撃力0〜100換算
  const attackPower = Math.min(100, Math.floor((avgBrightness / 255) * 100));

  gaugeBar.style.width = attackPower + "%";
  powerText.textContent = "ATTACK POWER: " + attackPower;
});
</script>

</body>
</html>
