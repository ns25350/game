<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CAMERA - DB SAVE</title>

<style>
:root{ --accent:#39ff14; --bg:#0a0f0a; }

body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

/* ===== 利用規約 ===== */
.terms-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.terms-box{
  width:90%;
  max-width:420px;
  background:#111;
  border:2px solid var(--accent);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 30px var(--accent);
  animation:popUp 0.4s ease forwards;
}

@keyframes popUp{
  from{ transform:translateY(20px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}

.terms-box h2{
  color:var(--accent);
}

.terms-text{
  font-size:14px;
  text-align:left;
  max-height:160px;
  overflow-y:auto;
  margin-bottom:15px;
  line-height:1.6;
}

.terms-btn{
  padding:10px 30px;
  background:transparent;
  border:2px solid var(--accent);
  color:var(--accent);
  border-radius:50px;
  cursor:pointer;
}

.terms-btn:hover{
  background:var(--accent);
  color:black;
}

/* ===== ローディング ===== */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.loader-circle{
  width:70px;
  height:70px;
  border:4px solid rgba(57,255,20,0.2);
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.loader-text{
  margin-top:15px;
  color:var(--accent);
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* ===== メインUI ===== */
h1{
  color:var(--accent);
  text-shadow:0 0 15px var(--accent);
  margin-top:20px;
}

.video-wrapper{
  display:inline-block;
  margin:20px;
  border:2px solid var(--accent);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(57,255,20,0.4);
  background:#000;
}

video{
  width:320px;
  max-width:90vw;
  display:block;
}

.btn{
  padding:15px 50px;
  font-size:20px;
  background:transparent;
  border:2px solid var(--accent);
  color:var(--accent);
  border-radius:50px;
  cursor:pointer;
}

.btn:hover{
  background:var(--accent);
  color:black;
}

#status{
  margin-top:15px;
  color:var(--accent);
  font-weight:bold;
}
canvas{ display:none; }
</style>
</head>
<body>

<!-- 利用規約 -->
<div class="terms-overlay" id="termsOverlay">
  <div class="terms-box">
    <h2>利用規約</h2>
    <div class="terms-text">
      本アプリはカメラを使用し、撮影データをFirebaseへ保存します。<br><br>
      ・画像はデータベースへ送信されます。<br>
      ・実験的サービスです。<br>
      ・自己責任で利用してください。<br><br>
      同意する場合のみ利用可能です。
    </div>
    <button class="terms-btn" id="agreeBtn">同意する</button>
  </div>
</div>

<!-- ローディング -->
<div class="loader" id="loader">
  <div class="loader-circle"></div>
  <div class="loader-text">CONNECTING...</div>
</div>

<h1>NEON CAMERA</h1>

<div class="video-wrapper">
  <video id="video" autoplay playsinline></video>
</div>

<canvas id="canvas"></canvas>
<br>
<button class="btn" id="shootBtn">狙え！</button>
<div id="status"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔥 あなたの設定 */
const firebaseConfig = {
  apiKey: "AIzaSyB4OchbsfGGC_VozMPeBGbr2ZtiMJTWTJg",
  authDomain: "johou7-275be.firebaseapp.com",
  databaseURL: "https://johou7-275be-default-rtdb.firebaseio.com",
  projectId: "johou7-275be",
  storageBucket: "johou7-275be.firebasestorage.app",
  messagingSenderId: "840280999329",
  appId: "1:840280999329:web:d7cefde6ec9953cabb77e0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const termsOverlay = document.getElementById("termsOverlay");
const agreeBtn = document.getElementById("agreeBtn");
const loader = document.getElementById("loader");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const shootBtn = document.getElementById("shootBtn");
const status = document.getElementById("status");

/* 同意後スタート */
agreeBtn.addEventListener("click", async () => {
  termsOverlay.style.display="none";
  loader.style.display="flex";

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user" },
      audio:false
    });
    video.srcObject = stream;

    setTimeout(()=> loader.style.display="none",1000);

  }catch(err){
    alert("カメラを許可してください！");
  }
});

/* 撮影＆Firebase保存 */
shootBtn.addEventListener("click", async ()=>{
  status.innerText="送信中...";
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);

  const imageData = canvas.toDataURL("image/webp",0.5);

  try{
    await push(ref(db,"photos"),{
      image:imageData,
      timestamp:Date.now()
    });
    status.innerText="保存成功！";
  }catch(e){
    console.error(e);
    status.innerText="保存失敗（ルール確認）";
  }
});
</script>

</body>
</html>
