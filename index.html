<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pose Photo Battle</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

#hp { font-size: 24px; margin: 10px; }

video {
  width: 320px;
  border: 2px solid white;
}

#stats {
  margin-top: 8px;
  font-size: 18px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Pose Photo Battle</h1>
<div id="hp">HP: 300</div>

<video id="video" autoplay playsinline></video>

<div id="stats">
  HEAD: 0% / ARM: 0% / BODY: 0%
</div>

<button id="attackBtn">📸 攻撃！</button>

<script type="module">
import {
  PoseLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ================= Firebase ================= */

const firebaseConfig = {
  apiKey: "AIzaSyB4OchbsfGGC_VozMPeBGbr2ZtiMJTWTJg",
  authDomain: "johou7-275be.firebaseapp.com",
  projectId: "johou7-275be",
  storageBucket: "johou7-275be.firebasestorage.app",
  messagingSenderId: "840280999329",
  appId: "1:840280999329:web:d7cefde6ec9953cabb77e0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= Game ================= */

let enemyHP = 300;
let currentData = { head:0, arm:0, body:0 };
const hpDisplay = document.getElementById("hp");
const statsDisplay = document.getElementById("stats");
const video = document.getElementById("video");

async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
  );

  const poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task"
    },
    runningMode: "VIDEO",
    numPoses: 1
  });

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  video.addEventListener("loadeddata", () => {
    detect(poseLandmarker);
  });
}

function detect(poseLandmarker) {
  const results = poseLandmarker.detectForVideo(video, performance.now());

  if (results.landmarks.length > 0) {
    const lm = results.landmarks[0];

    const head = lm[0].visibility || 0;
    const leftWrist = lm[15].visibility || 0;
    const rightWrist = lm[16].visibility || 0;
    const leftShoulder = lm[11].visibility || 0;
    const rightShoulder = lm[12].visibility || 0;

    const arm = Math.max(leftWrist, rightWrist);
    const body = (leftShoulder + rightShoulder) / 2;

    currentData = {
      head: Math.round(head * 100),
      arm: Math.round(arm * 100),
      body: Math.round(body * 100)
    };

    statsDisplay.textContent =
      `HEAD: ${currentData.head}% / ARM: ${currentData.arm}% / BODY: ${currentData.body}%`;
  }

  requestAnimationFrame(() => detect(poseLandmarker));
}

/* ================= 攻撃処理 ================= */

document.getElementById("attackBtn").addEventListener("click", async () => {

  if(enemyHP <= 0) return;

  // 攻撃力計算
  let attackPower =
    currentData.head * 0.5 +
    currentData.arm * 0.3 +
    currentData.body * 0.2;

  attackPower = Math.round(attackPower);

  enemyHP -= attackPower;
  if(enemyHP < 0) enemyHP = 0;

  hpDisplay.textContent = `HP: ${enemyHP} (-${attackPower})`;

  // 📸 画像取得
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);
  const imageData = canvas.toDataURL("image/jpeg", 0.7);

  // 🔥 Firebaseに保存
  await addDoc(collection(db, "poseData"), {
    timestamp: Date.now(),
    head: currentData.head,
    arm: currentData.arm,
    body: currentData.body,
    attackPower: attackPower,
    image: imageData
  });

  if(enemyHP === 0){
    hpDisplay.textContent = "ENEMY DEFEATED!!!";
  }
});

init();
</script>
</body>
</html>
