<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SLAYER - Final Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
</head>
<body>

<div id="loading-screen" class="screen">
    <div class="loader">
        <div class="glitch-text">INITIALIZING AI...</div>
        <div class="progress-container"><div id="load-progress-bar"></div></div>
        <p>CONNECTING TO NEURAL NETWORK...</p>
    </div>
</div>

<div id="tos-screen" class="screen" style="display: none;">
    <div class="modal-content">
        <h2 class="neon-text-blue">【ACCESS AGREEMENT】</h2>
        <div class="tos-text">
            <p>1. カメラ映像から骨格を解析し、サイバー空間へ投影します。</p>
            <p>2. 解析データおよび静止画はFirebaseへ送信・保存されます。</p>
            <p>3. 公序良俗に反するターゲットへの攻撃を禁じます。</p>
        </div>
        <button id="agreeBtn" class="btn">AGREE & CONNECT</button>
    </div>
</div>

<div id="game-screen" class="screen" style="display: none;">
    <h1 class="neon-title">NEON SLAYER</h1>
    
    <div class="enemy-container">
        <div class="enemy-visual"><div class="enemy-glitch">TARGET: CORE-ZERO</div></div>
        <div class="hp-container">
            <div id="hpBar" class="hp-bar-fill"></div>
            <div class="hp-label">HP: <span id="hpValue">1000</span> / 1000</div>
        </div>
    </div>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="damage-overlay"></div>
    </div>

    <div class="controls">
        <button class="btn" id="shootBtn" disabled>BOOTING AI...</button>
        <div id="status">READY TO SCAN</div>
    </div>
</div>

<div id="result-screen" class="screen" style="display: none;">
    <div class="result-container">
        <h2 class="neon-text-pink">MISSION COMPLETE</h2>
        <div id="result-list" class="result-list">
            </div>
        <button id="retryBtn" class="btn">REBOOT SYSTEM (RETRY)</button>
    </div>
</div>

<canvas id="saveCanvas" style="display:none;"></canvas>

<script type="module" src="script.js"></script>
</body>
</html>
