<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODY ATTACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
</head>
<body>

<div id="loading-screen">
    <div class="loader">
        <div class="glitch-text" data-text="INITIALIZING AI...">INITIALIZING AI...</div>
        <div class="progress-container">
            <div id="load-progress-bar"></div>
        </div>
        <p id="load-status">CONNECTING TO NEURAL NETWORK...</p>
    </div>
</div>

<div id="tosModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2 class="neon-text">【重要】利用規約</h2>
        <p>カメラ画像と解析データをFirebaseへ送信します。<br>同意してサイバー空間へ接続しますか？</p>
        <button id="agreeBtn" class="btn">同意して接続</button>
    </div>
</div>

<button id="infoToggle" class="side-btn">DATA</button>
<div id="damageTable" class="floating-panel">
    <h3>ATTACK DATA</h3>
    <ul>
        <li><span class="part">HEAD</span> <span class="dmg">150 DMG</span></li>
        <li><span class="part">BODY</span> <span class="dmg">80 DMG</span></li>
        <li><span class="part">ARMS</span> <span class="dmg">30 DMG</span></li>
        <li><span class="part">LEGS</span> <span class="dmg">40 DMG</span></li>
    </ul>
</div>

<h1 class="neon-title">NEON SLAYER</h1>

<div class="enemy-container">
    <div class="enemy-visual">
        <div class="enemy-glitch">TARGET: CORE-ZERO</div>
    </div>
    <div class="hp-container">
        <div id="hpBar" class="hp-bar-fill"></div>
        <div class="hp-label">HP: <span id="hpValue">1000</span> / 1000</div>
    </div>
    <div id="damageText" class="damage-popup"></div>
</div>

<div class="video-wrapper">
    <video id="video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="shootBtn" disabled>SYSTEM LOADING...</button>
    <div id="status"></div>
</div>

<canvas id="saveCanvas" style="display:none;"></canvas>

<script type="module" src="script.js"></script>
</body>
</html>
