<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CAMERA - DB SAVE</title>

<style>
:root{ --accent:#39ff14; --bg:#0a0f0a; }

body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

/* ===== 利用規約モーダル ===== */
.terms-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.terms-box{
  width:90%;
  max-width:400px;
  background:#111;
  border:2px solid var(--accent);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 30px var(--accent);
  transform:translateY(30px);
  opacity:0;
  animation:popUp 0.5s forwards;
}

@keyframes popUp{
  to{
    transform:translateY(0);
    opacity:1;
  }
}

.terms-box h2{
  color:var(--accent);
  margin-top:0;
}

.terms-text{
  font-size:14px;
  text-align:left;
  max-height:150px;
  overflow-y:auto;
  margin-bottom:15px;
  line-height:1.6;
}

.terms-btn{
  padding:10px 30px;
  background:transparent;
  border:2px solid var(--accent);
  color:var(--accent);
  border-radius:50px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

.terms-btn:hover{
  background:var(--accent);
  color:black;
}

/* ===== ローディング ===== */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  display:none;
}

.loader-circle{
  width:80px;
  height:80px;
  border:4px solid rgba(57,255,20,0.2);
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 20px var(--accent);
}

.loader-text{
  margin-top:20px;
  color:var(--accent);
  letter-spacing:3px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* ===== メインUI ===== */
h1{
  color:var(--accent);
  text-shadow:0 0 15px var(--accent);
  margin-top:20px;
  letter-spacing:2px;
}

.video-wrapper{
  position:relative;
  display:inline-block;
  margin:20px;
  border:2px solid var(--accent);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(57,255,20,0.4);
  background:#000;
}

video{
  width:320px;
  max-width:90vw;
  display:block;
}

.btn{
  margin-top:10px;
  padding:15px 50px;
  font-size:20px;
  background:transparent;
  border:2px solid var(--accent);
  color:var(--accent);
  border-radius:50px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

.btn:hover{
  background:var(--accent);
  color:black;
  box-shadow:0 0 20px var(--accent);
}

canvas{ display:none; }

#status{
  margin-top:15px;
  color:var(--accent);
  font-weight:bold;
  min-height:1.5em;
}
</style>
</head>
<body>

<!-- ===== 利用規約 ===== -->
<div class="terms-overlay" id="termsOverlay">
  <div class="terms-box">
    <h2>利用規約</h2>
    <div class="terms-text">
      本アプリはカメラ機能を使用します。<br><br>
      ・撮影された画像はデータベースへ保存される場合があります。<br>
      ・本サービスは実験的機能を含みます。<br>
      ・利用者は自己責任で本アプリを利用するものとします。<br>
      ・不適切な用途での使用は禁止します。<br><br>
      上記に同意する場合のみご利用ください。
    </div>
    <button class="terms-btn" id="agreeBtn">同意する</button>
  </div>
</div>

<!-- ローディング -->
<div class="loader" id="loader">
  <div class="loader-circle"></div>
  <div class="loader-text">INITIALIZING CAMERA...</div>
</div>

<h1>NEON CAMERA</h1>

<div class="video-wrapper">
  <video id="video" autoplay playsinline></video>
</div>

<canvas id="canvas"></canvas>
<br>
<button class="btn" id="shootBtn">狙え！</button>
<div id="status"></div>

<script>
const termsOverlay = document.getElementById("termsOverlay");
const agreeBtn = document.getElementById("agreeBtn");
const loader = document.getElementById("loader");
const video = document.getElementById("video");

// 同意ボタン押下
agreeBtn.addEventListener("click", async () => {
  termsOverlay.style.display = "none";
  loader.style.display = "flex";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;

    setTimeout(()=>{
      loader.style.display="none";
    },1000);

  } catch (err) {
    alert("カメラを許可してください！");
  }
});
</script>

</body>
</html>
