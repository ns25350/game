<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狙え！NEON CAMERA</title>

<style>
:root{
  --accent:#39ff14;
  --bg:#0a0f0a;
  --panel:#111a11;
}

body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

/* ===== ローディング ===== */
.loader{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.loader-circle{
  width:80px;
  height:80px;
  border:4px solid rgba(57,255,20,0.2);
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 20px var(--accent);
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* ===== メイン ===== */
.container{
  padding:30px;
  opacity:0;
  transition:1s;
}

.container.active{
  opacity:1;
}

h1{
  color:var(--accent);
  text-shadow:0 0 15px var(--accent);
  letter-spacing:4px;
}

.video-wrapper{
  position:relative;
  display:inline-block;
  margin-top:20px;
  border:2px solid var(--accent);
  border-radius:20px;
  box-shadow:0 0 25px rgba(57,255,20,0.5);
  overflow: hidden;
}

video{
  width:320px;
  max-width:90%;
  display: block;
}

.snipe-btn{
  margin-top:25px;
  padding:15px 60px;
  font-size:22px;
  background:transparent;
  border:2px solid var(--accent);
  color:var(--accent);
  border-radius:50px;
  cursor:pointer;
  transition:0.3s;
  letter-spacing:4px;
}

.snipe-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  border-color: #555;
  color: #555;
}

.snipe-btn:hover:not(:disabled){
  background:var(--accent);
  color:black;
  box-shadow:0 0 25px var(--accent);
  transform:scale(1.05);
}

#photos{
  margin-top:30px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

#photos img{
  width:150px;
  border-radius:15px;
  border:2px solid var(--accent);
  box-shadow:0 0 20px rgba(57,255,20,0.6);
}

canvas{
  display:none;
}
</style>
</head>

<body>

<div class="loader" id="loader">
  <div class="loader-circle"></div>
  <div style="color:#39ff14;margin-top:15px;">LOADING NEON SYSTEM...</div>
</div>

<div class="container" id="main">
  <h1>NEON CAMERA</h1>

  <div class="video-wrapper">
    <video id="video" autoplay playsinline></video>
  </div>

  <canvas id="canvas"></canvas>

  <br>
  <button class="snipe-btn" id="shootBtn">狙え！</button>

  <div id="photos"></div>
</div>

<script type="module">
  // 必要な機能をFirebaseから読み込む
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getStorage, ref, uploadString } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  // あなたのFirebase設定
  const firebaseConfig = {
    apiKey: "AIzaSyDszgfNpmLUkTNe7w1gGRAHut9k_jmi6AQ",
    authDomain: "test11-b73da.firebaseapp.com",
    projectId: "test11-b73da",
    storageBucket: "test11-b73da.firebasestorage.app",
    messagingSenderId: "892220922906",
    appId: "1:892220922906:web:a4314dac8dfdd811dd85a3",
    measurementId: "G-2RQS6345FM"
  };

  // Firebaseの初期化
  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  // 要素の取得
  const loader = document.getElementById("loader");
  const main = document.getElementById("main");
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const shootBtn = document.getElementById("shootBtn");
  const photos = document.getElementById("photos");

  // 1. ローディング表示
  window.addEventListener("load", () => {
    setTimeout(() => {
      loader.style.display = "none";
      main.classList.add("active");
    }, 1000);
  });

  // 2. カメラの開始
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });
      video.srcObject = stream;
    } catch (err) {
      alert("カメラの起動に失敗しました。ブラウザの許可設定を確認してください。");
      console.error(err);
    }
  }
  startCamera();

  // 3. 撮影とFirebaseへのアップロード
  shootBtn.addEventListener("click", async () => {
    const ctx = canvas.getContext("2d");
    
    // カメラの映像サイズをキャンバスに反映
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // 画像をBase64文字列に変換
    const imageData = canvas.toDataURL("image/png");

    try {
      // ボタンを無効化
      shootBtn.innerText = "転送中...";
      shootBtn.disabled = true;

      // 保存するファイル名を作成 (uploads/フォルダ内)
      const fileName = `neon_${Date.now()}.png`;
      const storageRef = ref(storage, 'uploads/' + fileName);

      // Firebase Storageにアップロード
      await uploadString(storageRef, imageData, 'data_url');
      
      // 成功したら画面に画像を追加
      const img = document.createElement("img");
      img.src = imageData;
      photos.prepend(img);

      shootBtn.innerText = "成功！";
    } catch (error) {
      console.error("Upload Error:", error);
      alert("保存に失敗しました。FirebaseのStorageルールが『public』になっているか確認してください。");
      shootBtn.innerText = "狙え！";
    } finally {
      // 1.5秒後にボタンを元に戻す
      setTimeout(() => {
        shootBtn.innerText = "狙え！";
        shootBtn.disabled = false;
      }, 1500);
    }
  });
</script>

</body>
</html>
