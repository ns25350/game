<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SLAYER - Pose Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tosModal" class="modal">
    <div class="modal-content">
        <h2>【重要】利用規約</h2>
        <p>本ゲームはカメラ画像と解析データをFirebaseに送信・保存します。公序良俗に反する撮影はお控えください。</p>
        <p>送信されたデータは開発およびランキング表示に使用されることに同意しますか？</p>
        <button id="agreeBtn" class="btn">同意して開始</button>
    </div>
</div>

<h1>NEON SLAYER</h1>

<div class="enemy-container">
    <div class="enemy-label">TARGET: CYBER-CORE</div>
    <div class="hp-bar-bg">
        <div id="hpBar" class="hp-bar-fill"></div>
    </div>
    <div id="damageText" class="damage-popup"></div>
</div>

<div class="video-wrapper">
    <video id="video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="shootBtn" disabled>Loading...</button>
    <div id="status"></div>
</div>

<canvas id="saveCanvas" style="display:none;"></canvas>

<script type="module" src="script.js"></script>
</body>
</html>
